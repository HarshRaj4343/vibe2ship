# One-command build + push + deploy to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=\
#_REGION=asia-south1,\
#_GEMINI_API_KEY=xxx,\
#_FIREBASE_API_KEY=xxx,\
#_FIREBASE_AUTH_DOMAIN=xxx,\
#_FIREBASE_PROJECT_ID=xxx,\
#_FIREBASE_STORAGE_BUCKET=xxx,\
#_FIREBASE_MESSAGING_SENDER_ID=xxx,\
#_FIREBASE_APP_ID=xxx,\
#_MAPS_API_KEY=xxx,\
#_APP_URL=https://urbanpulse-xxxxx.run.app
#
# Tip: keep the substitutions in a file and pass --substitutions-file is not
# supported, so use the gcloud-deploy.sh helper which reads .env.deploy.

substitutions:
  _REGION: 'asia-south1'
  _SERVICE: 'urbanpulse'
  _GEMINI_API_KEY: ''
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_MESSAGING_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
  _MAPS_API_KEY: ''
  _GOOGLE_TRANSLATE_API_KEY: ''
  _APP_URL: ''
  _VAPID_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build the image, inlining the public client-side env vars at build time.
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${_MAPS_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=${_APP_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_VAPID_KEY=${_VAPID_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE}:latest'
      - '.'

  # 2. Push both tags.
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/${_SERVICE}']

  # 3. Deploy to Cloud Run with the server-only secret as a runtime env var.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
      - '--platform'
      - 'managed'
      - '--region'
      - '${_REGION}'
      - '--allow-unauthenticated'
      - '--port'
      - '3080'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},GOOGLE_TRANSLATE_API_KEY=${_GOOGLE_TRANSLATE_API_KEY}'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/${_SERVICE}:latest'
